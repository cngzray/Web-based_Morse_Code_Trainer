<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Morse Code Tree</title>
    <style>
        body {
            background-color: #000;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }
        svg {
            background-color: #000;
        }
        .label-text {
            fill: #ccc;
            font-size: 16px;
            font-weight: normal;
            text-anchor: middle;
            dominant-baseline: middle;
        }
        .line {
            stroke: #ccc;
            stroke-width: 1.5;
            fill: none;
        }
        .node-rect {
            fill: #666;
            stroke: #ccc;
            stroke-width: 0.7;
            cursor: pointer;
        }
        .node-rect-vertical {
            fill: #666;
            stroke: #ccc;
            stroke-width: 0.7;
        }
        .node-circle {
            fill: #666;
            stroke: #ccc;
            stroke-width: 0.7;
            cursor: pointer;
        }
        .title-text {
            fill: #ccc;
            font-size: 28px;
            font-weight: normal;
        }
        .red-node {
            fill: red !important;
            stroke: #fff;
            stroke-width: 1;
        }
        #resetBtn, #btn1, #btn2 {
            fill: #00aa00 !important;
        }

        /* 按钮下方文字样式 */
        .btn-label {
            fill: #ccc;
            font-size: 14px;
            text-anchor: middle;
            dominant-baseline: auto;
        }

        /* 黄色快捷键提示文字 */
        .tip-text {
            fill: #ffd700;
            font-size: 13px;
            text-anchor: middle;
        }
    </style>
</head>
<body>
<!-- 扩大了 SVG 高度，确保文字能显示 -->
<svg width="650" height="700" viewBox="0 60 650 640">
    <!-- 标题 整体下移30px -->
    <text x="150" y="75" class="title-text">MORSE</text>
    <text x="390" y="75" class="title-text">CODE</text>

    <!-- 顶部倒三角 + 垂直线 整体右移15px -->
    <polygon id="start" points="315,73 295,47 335,47" fill="none" stroke="#ccc" stroke-width="1.5"/>
    <line x1="315" y1="73" x2="315" y2="110" class="line"/>

    <!-- 第一行 平均分布：O M T     E I S H -->
    <rect id="O" x="25" y="100" width="50" height="20" class="node-rect"/>
    <text x="50" y="110" class="label-text">O</text>

    <rect id="M" x="125" y="100" width="50" height="20" class="node-rect"/>
    <text x="150" y="110" class="label-text">M</text>

    <rect id="T" x="225" y="100" width="50" height="20" class="node-rect"/>
    <text x="250" y="110" class="label-text">T</text>

    <circle id="E" cx="375" cy="110" r="15" class="node-circle"/>
    <text x="375" y="110" class="label-text">E</text>

    <circle id="I" cx="450" cy="110" r="15" class="node-circle"/>
    <text x="450" y="110" class="label-text">I</text>

    <circle id="S" cx="525" cy="110" r="15" class="node-circle"/>
    <text x="525" y="110" class="label-text">S</text>

    <circle id="H" cx="600" cy="110" r="15" class="node-circle"/>
    <text x="600" y="110" class="label-text">H</text>

    <!-- 第一行连接线 -->
    <line x1="75" y1="110" x2="125" y2="110" class="line"/>
    <line x1="175" y1="110" x2="225" y2="110" class="line"/>
    <line x1="275" y1="110" x2="315" y2="110" class="line"/>
    <line x1="315" y1="110" x2="360" y2="110" class="line"/>
    <line x1="390" y1="110" x2="435" y2="110" class="line"/>
    <line x1="465" y1="110" x2="510" y2="110" class="line"/>
    <line x1="540" y1="110" x2="585" y2="110" class="line"/>

    <!-- 第二行 -->
    <rect id="Q" x="25" y="180" width="50" height="20" class="node-rect"/>
    <text x="50" y="190" class="label-text">Q</text>
    <line x1="75" y1="190" x2="150" y2="190" class="line"/>

    <circle id="G" cx="150" cy="190" r="15" class="node-circle"/>
    <text x="150" y="190" class="label-text">G</text>
    <line x1="150" y1="120" x2="150" y2="175" class="line"/>
    
    <rect id="U" x="440" y="165" width="20" height="50" class="node-rect-vertical"/>
    <text x="450" y="190" class="label-text">U</text>
    <line x1="450" y1="125" x2="450" y2="165" class="line"/>

    <rect id="V" x="515" y="165" width="20" height="50" class="node-rect-vertical"/>
    <text x="525" y="190" class="label-text">V</text>
    <line x1="525" y1="125" x2="525" y2="165" class="line"/>

    <!-- 第三行 -->
    <circle id="Z" cx="150" cy="260" r="15" class="node-circle"/>
    <text x="150" y="260" class="label-text">Z</text>
    <line x1="150" y1="205" x2="150" y2="245" class="line"/>

    <circle id="F" cx="450" cy="260" r="15" class="node-circle"/>
    <text x="450" y="260" class="label-text">F</text>
    <line x1="450" y1="215" x2="450" y2="245" class="line"/>

    <!-- 第四行 -->
    <rect id="Y" x="25" y="330" width="50" height="20" class="node-rect"/>
    <text x="50" y="340" class="label-text">Y</text>

    <rect id="K" x="125" y="330" width="50" height="20" class="node-rect"/>
    <text x="150" y="340" class="label-text">K</text>
    <line x1="175" y1="340" x2="235" y2="340" class="line"/>

    <circle id="N" cx="250" cy="340" r="15" class="node-circle"/>
    <text x="250" y="340" class="label-text">N</text>
    
    <rect id="A" x="365" y="315" width="20" height="50" class="node-rect-vertical"/>
    <text x="375" y="340" class="label-text">A</text>

    <circle id="R" cx="450" cy="340" r="15" class="node-circle"/>
    <text x="450" y="340" class="label-text">R</text>

    <circle id="L" cx="525" cy="340" r="15" class="node-circle"/>
    <text x="525" y="340" class="label-text">L</text>

    <line x1="75" y1="340" x2="125" y2="340" class="line"/>
    <line x1="385" y1="340" x2="435" y2="340" class="line"/>
    <line x1="465" y1="340" x2="510" y2="340" class="line"/>
    <line x1="250" y1="120" x2="250" y2="325" class="line"/>
    <line x1="375" y1="125" x2="375" y2="315" class="line"/>

    <!-- 第五行 -->
    <circle id="C" cx="150" cy="410" r="15" class="node-circle"/>
    <text x="150" y="410" class="label-text">C</text>
    <line x1="150" y1="355" x2="150" y2="395" class="line"/>

    <!-- 第六行 -->
    <rect id="X" x="125" y="470" width="50" height="20" class="node-rect"/>
    <text x="150" y="480" class="label-text">X</text>

    <circle id="D" cx="250" cy="480" r="15" class="node-circle"/>
    <text x="250" y="480" class="label-text">D</text>
    <line x1="250" y1="355" x2="250" y2="465" class="line"/>
    <line x1="175" y1="480" x2="235" y2="480" class="line"/>
    
    <rect id="W" x="365" y="445" width="20" height="50" class="node-rect-vertical"/>
    <text x="375" y="470" class="label-text">W</text>
    <line x1="375" y1="365" x2="375" y2="445" class="line"/>

    <circle id="P" cx="450" cy="470" r="15" class="node-circle"/>
    <text x="450" y="470" class="label-text">P</text>
    <line x1="385" y1="470" x2="435" y2="470" class="line"/>

    <!-- 第七行 -->
    <circle id="B" cx="250" cy="560" r="15" class="node-circle"/>
    <text x="250" y="560" class="label-text">B</text>
    <line x1="250" y1="495" x2="250" y2="545" class="line"/>
    
    <rect id="J" x="365" y="535" width="20" height="50" class="node-rect-vertical"/>
    <text x="375" y="560" class="label-text">J</text>
    <line x1="375" y1="495" x2="375" y2="535" class="line"/>

    <!-- 底部按钮 -->
    <rect id="resetBtn" x="25" y="565" width="50" height="20" class="node-rect"/>
    <text x="50" y="610" class="btn-label">重置</text>

    <rect id="btn1" x="95" y="565" width="50" height="20" class="node-rect"/>
    <text x="120" y="610" class="btn-label">长</text>

    <circle id="btn2" cx="170" cy="575" r="15" class="node-circle"/>
    <text x="170" y="610" class="btn-label">短</text>

    <!-- 现在一定能看到的黄色文字 -->
    <text x="100" y="650" class="tip-text">快捷键：“1”、“2”、“空格”。</text>

</svg>

<script>
const pathMap = {
  start: { rect: "T", circle: "E" },
  T: { rect: "M", circle: "N" },
  M: { rect: "O", circle: "G" },
  O: { rect: null, circle: null },
  G: { rect: "Q", circle: "Z" },
  Q: { rect: null, circle: null },
  Z: { rect: null, circle: null },
  E: { rect: "A", circle: "I" },
  I: { rect: "U", circle: "S" },
  S: { rect: "V", circle: "H" },
  H: { rect: null, circle: null },
  U: { rect: null, circle: "F" },
  V: { rect: null, circle: null },
  F: { rect: null, circle: null },
  N: { rect: "K", circle: "D" },
  K: { rect: "Y", circle: "C" },
  Y: { rect: null, circle: null },
  C: { rect: null, circle: null },
  X: { rect: null, circle: null },
  D: { rect: "X", circle: "B" },
  B: { rect: null, circle: null },
  A: { rect: "W", circle: "R" },
  R: { rect: null, circle: "L" },
  L: { rect: null, circle: null },
  W: { rect: "J", circle: "P" },
  P: { rect: null, circle: null },
  J: { rect: null, circle: null }
};

let current = "start";
let isPlaying = false;
let lastClickTime = Date.now();

// 清除当前节点红色 → 变灰色
function clearCurrentNode() {
  if (current && current !== "start") {
    const node = document.getElementById(current);
    if (node) node.classList.remove("red-node");
  }
}

// 重置逻辑：当前节点变灰 + 位置回到三角形
function autoReset() {
  clearCurrentNode();
  current = "start";
  isPlaying = false;
}

const AudioContext = window.AudioContext || window.webkitAudioContext;
const audioCtx = new AudioContext();

function playBeep(isLong, callback) {
  if (audioCtx.state === 'suspended') audioCtx.resume();
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = 'sine';
  o.frequency.value = 700;
  g.gain.value = 0.2;
  o.connect(g);
  g.connect(audioCtx.destination);
  
  const t = isLong ? 0.6 : 0.2;
  o.start();
  o.stop(audioCtx.currentTime + t);
  
  setTimeout(() => {
    isPlaying = false;
    callback();
  }, t * 1000);
}

// 点击逻辑
function onButtonClick(type, isLong) {
  const now = Date.now();
  const gap = (now - lastClickTime) / 1000;

  if (gap > 1) {
    autoReset();
  }

  if (isPlaying) return;
  const nextNode = pathMap[current][type];
  if (!nextNode) return;

  isPlaying = true;
  playBeep(isLong, () => {
    clearCurrentNode();
    const el = document.getElementById(nextNode);
    if (el) el.classList.add("red-node");
    current = nextNode;
    lastClickTime = Date.now();
  });
}

// 绑定按钮
document.getElementById("btn1").onclick = () => onButtonClick("rect", true);
document.getElementById("btn2").onclick = () => onButtonClick("circle", false);
document.getElementById("resetBtn").onclick = autoReset;

// 键盘按键控制
document.addEventListener('keydown', (e) => {
  if(e.code === 'Space') e.preventDefault();
  
  switch(e.key) {
    case '1':
      onButtonClick("rect", true);
      break;
    case '2':
      onButtonClick("circle", false);
      break;
    case ' ':
      autoReset();
      break;
  }
});
</script>
</body>
</html>
